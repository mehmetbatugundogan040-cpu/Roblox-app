server {
    listen 80;
    server_name mehmetbatugundogan09.tech www.mehmetbatugundogan09.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mehmetbatugundogan09.tech www.mehmetbatugundogan09.tech;

    ssl_certificate /etc/letsencrypt/live/mehmetbatugundogan09.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mehmetbatugundogan09.tech/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /novnc/ {
        proxy_pass http://websockify:6080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /wsproxy/ {
        proxy_pass http://websockify:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
