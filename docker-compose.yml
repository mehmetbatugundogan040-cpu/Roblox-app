version: "3.9"

services:
  api:
    build: ./api
    container_name: vm_api
    environment:
      - APP_SECRET=${APP_SECRET}
      - BASE_IMAGE=${BASE_IMAGE}
      - VM_STATE_DIR=${VM_STATE_DIR}
    volumes:
      - vm_state:${VM_STATE_DIR}
      - /vm-images:/vm-images:ro
    networks: [vmnet]

  websockify:
    image: novnc/websockify:latest
    container_name: vm_websockify
    command: >
      --web=/usr/share/novnc
      0.0.0.0:6080
      localhost:5901
    networks: [vmnet]

  nginx:
    image: nginx:alpine
    container_name: vm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - api
      - websockify
    networks: [vmnet]

networks:
  vmnet:

volumes:
  vm_state:
