<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Minecraft Web Hub++</title><style>:root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:#0b1220;color:#e5e7eb}header{padding:10px 14px;background:#111827;border-bottom:1px solid #263247;display:flex;justify-content:space-between}.wrap{display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 48px)}.panel{padding:10px;overflow:auto;border-right:1px solid #263247}.card{background:#111827;border:1px solid #334155;border-radius:10px;padding:10px;margin-bottom:10px}h2{margin:0 0 8px;font-size:.95rem}label{font-size:.82rem}input,button,select,textarea{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:#0b1324;color:#e5e7eb}button{cursor:pointer;background:#166534;border-color:#16a34a;font-weight:700}button.secondary{background:#1f2937;border-color:#374151}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.world{position:relative}canvas{display:block;width:100%;height:100%}#crosshair{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:14px;height:14px}#crosshair:before,#crosshair:after{content:"";position:absolute;background:#fff}#crosshair:before{left:6px;top:0;width:2px;height:14px}#crosshair:after{left:0;top:6px;width:14px;height:2px}#hotbar{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);display:flex;gap:6px}.slot{width:38px;height:38px;border:2px solid #64748b;border-radius:6px;background:#1e293b}.slot.active{border-color:#facc15}.overlayMenu{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center}.menuCard{width:min(500px,94%);background:#111827;padding:16px;border:1px solid #374151;border-radius:12px}.hidden{display:none}@media(max-width:980px){.wrap{grid-template-columns:1fr}.panel{border-right:none;border-bottom:1px solid #263247}}</style></head><body>
<header><strong>Minecraft Web Hub++</strong><div id="profileTxt">Guest</div></header>
<div class="wrap"><aside class="panel">
<div class="card"><h2>1) Login/Profile</h2><label>Username</label><input id="username" placeholder="Player123"/><label>Theme</label><select id="theme"><option>Default</option><option>Dark</option><option>Retro</option></select><button id="saveProfile">Save Profile</button></div>
<div class="card"><h2>2) Servers (Address + Port)</h2><div class="row"><input id="serverName" placeholder="Name"/><input id="serverPort" type="number" value="25565"/></div><input id="serverHost" placeholder="play.example.net"/><div class="row"><button id="addServer">Add Server</button><button id="removeAllServers" class="secondary">Clear All</button></div><div class="row"><button id="exportServers" class="secondary">Export JSON</button><button id="importServers" class="secondary">Import JSON</button></div><input id="importServersFile" type="file" accept="application/json" style="display:none"/><ul id="serverList"></ul></div>
<div class="card"><h2>3) Addons/Mods Profiles</h2><input id="addonInput" type="file" accept=".jar,.zip" multiple/><input id="profileName" placeholder="Profile name (e.g. PVP)"/><div class="row"><button id="saveAddonProfile">Save Profile</button><button id="loadAddonProfile" class="secondary">Load Profile</button></div><select id="addonProfiles"></select><ul id="addonList"></ul></div>
<div class="card"><h2>4) Launcher Flow + Settings</h2><div class="row"><select id="gameMode"><option>Survival</option><option>Creative</option><option>Adventure</option></select><select id="render"><option>8 chunks</option><option selected>12 chunks</option><option>16 chunks</option></select></div><div class="row"><input id="fov" type="range" min="55" max="110" value="80"/><input id="speed" type="range" min="6" max="26" value="14"/></div><div class="row"><button id="fullscreen" class="secondary">Fullscreen</button><button id="openPause" class="secondary">Pause Menu</button></div><button id="lockMouse">Play</button></div>
</aside><main class="world" id="world"><div id="crosshair"></div><div id="hotbar"></div>
<div id="startMenu" class="overlayMenu"><div class="menuCard"><h2>Main Menu</h2><div class="row"><button id="singleBtn">Singleplayer</button><button id="multiBtn">Multiplayer</button></div><button id="startPlay">Enter World</button></div></div>
<div id="pauseMenu" class="overlayMenu hidden"><div class="menuCard"><h2>Pause Menu</h2><button id="resumeBtn">Resume Game</button><button id="toMenuBtn" class="secondary">Back to Main Menu</button></div></div>
</main></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.164.1/build/three.module.js';
import { PointerLockControls } from 'https://unpkg.com/three@0.164.1/examples/jsm/controls/PointerLockControls.js';
const $=id=>document.getElementById(id);
const world=$('world'),renderer=new THREE.WebGLRenderer({antialias:true});world.appendChild(renderer.domElement);
const scene=new THREE.Scene();scene.background=new THREE.Color(0x87ceeb);const camera=new THREE.PerspectiveCamera(80,1,.1,1000);camera.position.set(0,2.6,5);scene.add(new THREE.AmbientLight(0xffffff,.5));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(10,30,20);scene.add(dl);const controls=new PointerLockControls(camera,renderer.domElement);
const geo=new THREE.BoxGeometry(1,1,1),mats=[new THREE.MeshLambertMaterial({color:0x59a83b}),new THREE.MeshLambertMaterial({color:0x7c4a26})],blocks=[],map=new Map(),key=(x,y,z)=>`${x},${y},${z}`;
const add=(x,y,z)=>{if(map.has(key(x,y,z)))return;const m=new THREE.Mesh(geo,mats[(x+z)&1]);m.position.set(x,y,z);scene.add(m);blocks.push(m);map.set(key(x,y,z),m)};const rem=(m)=>{map.delete(key(m.position.x,m.position.y,m.position.z));const i=blocks.indexOf(m);if(i>=0)blocks.splice(i,1);scene.remove(m)};for(let x=-30;x<=30;x++)for(let z=-30;z<=30;z++)add(x,0,z);
const ray=new THREE.Raycaster();addEventListener('contextmenu',e=>e.preventDefault());addEventListener('mousedown',e=>{if(!controls.isLocked)return;ray.setFromCamera(new THREE.Vector2(),camera);const h=ray.intersectObjects(blocks)[0];if(!h)return;if(e.button===0&&h.object.position.y>0)rem(h.object);if(e.button===2){const p=h.point.clone().add(h.face.normal.clone().multiplyScalar(.5)).floor();add(p.x,p.y,p.z)}});
const keys=new Set();addEventListener('keydown',e=>{keys.add(e.code);if(e.code==='Escape'&&controls.isLocked){controls.unlock();$('pauseMenu').classList.remove('hidden')}});addEventListener('keyup',e=>keys.delete(e.code));
function rs(){const r=world.getBoundingClientRect();camera.aspect=r.width/r.height;camera.updateProjectionMatrix();renderer.setSize(r.width,r.height,false)}rs();addEventListener('resize',rs);
let last=performance.now();const vel=new THREE.Vector3(),dir=new THREE.Vector3();function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;camera.fov=+$('fov').value;camera.updateProjectionMatrix();if(controls.isLocked){vel.x*=.85;vel.z*=.85;dir.x=+keys.has('KeyD')-+keys.has('KeyA');dir.z=+keys.has('KeyW')-+keys.has('KeyS');dir.normalize();const s=+$('speed').value;vel.x-=dir.x*s*dt;vel.z-=dir.z*s*dt;controls.moveRight(-vel.x*dt);controls.moveForward(-vel.z*dt);camera.position.y=2.6;}renderer.render(scene,camera);requestAnimationFrame(loop)}requestAnimationFrame(loop);
$('lockMouse').onclick=()=>controls.lock();$('fullscreen').onclick=async()=>!document.fullscreenElement?await document.documentElement.requestFullscreen():await document.exitFullscreen();
$('openPause').onclick=()=>{$('pauseMenu').classList.remove('hidden');controls.unlock()};$('resumeBtn').onclick=()=>{$('pauseMenu').classList.add('hidden');controls.lock()};$('toMenuBtn').onclick=()=>{$('pauseMenu').classList.add('hidden');$('startMenu').classList.remove('hidden')};$('startPlay').onclick=()=>{$('startMenu').classList.add('hidden');controls.lock()};$('singleBtn').onclick=()=>$('startPlay').click();$('multiBtn').onclick=()=>$('startPlay').click();
const servers=JSON.parse(localStorage.getItem('servers')||'[]');const renderServers=()=>{$('serverList').innerHTML='';servers.forEach((s,i)=>{const li=document.createElement('li');li.textContent=`${s.name} - ${s.host}:${s.port}`;const b=document.createElement('button');b.textContent='Remove';b.className='secondary';b.onclick=()=>{servers.splice(i,1);localStorage.setItem('servers',JSON.stringify(servers));renderServers()};li.appendChild(document.createElement('br'));li.appendChild(b);$('serverList').appendChild(li)})};renderServers();
$('addServer').onclick=()=>{const name=$('serverName').value.trim(),host=$('serverHost').value.trim(),port=+$('serverPort').value;if(!name||!host||port<1||port>65535)return alert('Invalid server');servers.push({name,host,port});localStorage.setItem('servers',JSON.stringify(servers));renderServers()};$('removeAllServers').onclick=()=>{servers.length=0;localStorage.setItem('servers','[]');renderServers()};
$('exportServers').onclick=()=>{const blob=new Blob([JSON.stringify(servers,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='servers.json';a.click()};$('importServers').onclick=()=>$('importServersFile').click();$('importServersFile').onchange=async e=>{const f=e.target.files[0];if(!f)return;const data=JSON.parse(await f.text());if(!Array.isArray(data))return alert('Bad JSON');servers.splice(0,servers.length,...data);localStorage.setItem('servers',JSON.stringify(servers));renderServers()};
const addonState={files:[],profiles:JSON.parse(localStorage.getItem('addonProfiles')||'{}')};const renderProfiles=()=>{$('addonProfiles').innerHTML='';Object.keys(addonState.profiles).forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;$('addonProfiles').appendChild(o)})};const renderAddons=()=>{$('addonList').innerHTML='';addonState.files.forEach((f,i)=>{const li=document.createElement('li');const c=document.createElement('input');c.type='checkbox';c.checked=f.enabled;c.onchange=()=>f.enabled=c.checked;li.appendChild(c);li.append(' '+f.name+` (${Math.round(f.size/1024)} KB)`);const rm=document.createElement('button');rm.textContent='x';rm.className='secondary';rm.style.width='40px';rm.onclick=()=>{addonState.files.splice(i,1);renderAddons()};li.appendChild(rm);$('addonList').appendChild(li)})};
$('addonInput').onchange=e=>{addonState.files=[...e.target.files].map(f=>({name:f.name,size:f.size,enabled:true}));renderAddons()};$('saveAddonProfile').onclick=()=>{const n=$('profileName').value.trim();if(!n)return;addonState.profiles[n]=addonState.files;localStorage.setItem('addonProfiles',JSON.stringify(addonState.profiles));renderProfiles()};$('loadAddonProfile').onclick=()=>{const n=$('addonProfiles').value;if(!n)return;addonState.files=JSON.parse(JSON.stringify(addonState.profiles[n]||[]));renderAddons()};renderProfiles();
$('skinInput')?.addEventListener?.('change',()=>{});
const profile=JSON.parse(localStorage.getItem('profile')||'{"username":"Guest","theme":"Default"}');$('username').value=profile.username||'Guest';$('theme').value=profile.theme||'Default';$('profileTxt').textContent=profile.username||'Guest';$('saveProfile').onclick=()=>{const p={username:$('username').value.trim()||'Guest',theme:$('theme').value};localStorage.setItem('profile',JSON.stringify(p));$('profileTxt').textContent=p.username};
const hotbar=$('hotbar');for(let i=0;i<9;i++){const d=document.createElement('div');d.className='slot'+(i===0?' active':'');hotbar.appendChild(d)}
</script></body></html>
