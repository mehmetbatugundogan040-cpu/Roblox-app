<!doctype html>
<html>
<head><meta charset="utf-8"><title>Private Cloud VM</title></head>
<body>
  <h2>Private VM Portal</h2>
  <button id="start">Start VM</button>
  <button id="stop">Stop VM</button>
  <iframe id="viewer" style="width:100%;height:80vh;border:1px solid #ccc;"></iframe>

  <script>
    const access = new URLSearchParams(location.search).get("access");
    let sid = null;

    async function api(path, opts = {}) {
      const u = `/api/${path}${path.includes("?") ? "&" : "?"}access=${encodeURIComponent(access || "")}`;
      const r = await fetch(u, {
        ...opts,
        headers: { "Content-Type": "application/json", ...(opts.headers || {}) }
      });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    document.getElementById("start").onclick = async () => {
      const data = await api("session/start", { method: "POST" });
      sid = data.sid;
      document.getElementById("viewer").src = data.viewerUrl;
    };

    document.getElementById("stop").onclick = async () => {
      if (!sid) return;
      await api("session/stop", {
        method: "POST",
        body: JSON.stringify({ sid })
      });
      sid = null;
      document.getElementById("viewer").src = "";
    };
  </script>
</body>
</html>
